name: Release Single Header Asset

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-single-header:
    name: Generate and upload csv.hpp release asset
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Create release asset directory
      run: mkdir -p release-assets

    - name: Generate single header
      uses: vincentlaucsb/single_header@0.1.0
      with:
        config: single_header.json
        output: release-assets/csv.hpp

    - name: Generate SHA256 checksum
      run: |
        cd release-assets
        sha256sum csv.hpp > csv.hpp.sha256

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-assets/csv.hpp
          release-assets/csv.hpp.sha256
        fail_on_unmatched_files: true
        generate_release_notes: true
